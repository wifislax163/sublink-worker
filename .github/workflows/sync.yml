name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 1,11,21 * *"  # 每月 1 号和 21 号的凌晨 0 点执行
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    # 如果你是直接新建仓库而不是 Fork，可以删掉下面这行 if 判断
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 注意：这里的 token 建议保持默认，除非你有特殊的组织权限需求
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream changes
        id: sync
        uses: aormsby/fork-sync-actions@v3.4
        with:
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_branch: main
          upstream_sync_repo: 7Sageer/sublink-worker
          test_mode: false
          # 添加 -Xtheirs 确保在冲突时以作者代码为准，但保留你这个新加的 yaml 文件
          upstream_pull_args: '--allow-unrelated-histories -Xtheirs'
