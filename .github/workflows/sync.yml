name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 1,21 * *"  # 每月 1 号和 21 号的凌晨 0 点执行
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 必须使用具有写权限的 token，默认的 GITHUB_TOKEN 通常足够
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream changes
        id: sync
        uses: aormsby/fork-sync-actions@v3.4
        with:
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_branch: main
          upstream_sync_repo: 7Sageer/sublink-worker
          test_mode: false
          # 关键：使用 merge 策略，这会保留你本地新增的文件（工作流）
          upstream_pull_args: '--allow-unrelated-histories'
